version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: escrow-frontend-base:local
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - base

  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: escrow-frontend-base:local
